spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/finpay
    driver-class-name: org.postgresql.Driver
    username: finpay
    password: finpay
  data:
    redis:
      host: localhost
      port: 6379
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cache:
    type: redis
    cache-names:
      - walletDetails
    redis:
      time-to-live: 10m
      cache-null-values: false
