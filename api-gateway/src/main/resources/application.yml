server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 3000
        response-timeout: 10s
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: payment-wallet-transactions
          uri: http://localhost:8083
          order: -1
          predicates:
            - Path=/api/v1/wallets/*/transactions

        - id: wallet-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/wallets/**

        - id: payment-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/payments/**

        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/notifications/**

        - id: notification-internal-local
          uri: http://localhost:8084
          predicates:
            - Path=/internal/v1/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
